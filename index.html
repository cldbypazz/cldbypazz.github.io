<!DOCTYPE html>

    <link rel="icon" type="image/png" href="/icon/bypazzicon.png" />
    <style>
      html, body {
        margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; overflow-y: auto;
        font-family: 'Roboto Mono', monospace;
        background: linear-gradient(0deg, #1a1a1a, #000);
        /* edit background fade time if i want */
        animation: backgroundFade 5s infinite alternate ease-in-out; 
      }
      @keyframes backgroundFade {
        0%, 15% { background: #1a1a1a; }   /* light color for .75 sec */
        90%, 100% { background: #000; }    /* dark color fade for .5 sec */
      }
      .splash {
        position: fixed; top:0; left:0; width:100vw; height:100vh;
        background-color: rgba(0,0,0,0.85); color: white; display: flex;
        flex-direction: column; justify-content: center; align-items: center;
        z-index: 999; cursor: pointer; transition: all 1s ease;
      }
      .splash.fade { transform: scale(1.5); opacity: 0; }
      .splash h1 { font-size: 64px; font-weight: bold; margin:0; }
      .splash p { font-size: 24px; margin-top: 20px; opacity: 0; transition: opacity 1s ease; }
      .splash.showHint p { opacity: 1; }
      
      .simple-update {
        position: absolute;
        top: 15px;
        left: 0;
        width: 100%;
        text-align: center;
        color: white;
        font-size: 16px;
        z-index: 998;
        pointer-events: none;
      }

      .game-button {
        background-color: black; color: white; border: 1px solid red;
        font-size: 26px; width: 100%; cursor: pointer; border-radius: 10px;
        margin: 10px 0; max-width: 600px; display: block;
      }
      center { margin-top: 70px; margin-bottom: 80px; }
      
      #globalBanner {
        position: fixed; top: 0; left: 0; width: 100%;
        background-color: #ff0000; color: white; text-align: center;
        padding: 15px; font-weight: bold; font-size: 20px; z-index: 99999;
        display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      }
      #adminLockBtn {
        position: fixed; bottom: 15px; right: 15px;
        width: 40px; height: 40px; border-radius: 50%;
        background-color: rgba(255,255,255,0.1); border: none;
        font-size: 20px; cursor: pointer; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        opacity: 0.3; transition: opacity 0.2s;
      }
      #adminLockBtn:hover { opacity: 1; }
      #adminToggleBtn {
        position: fixed; bottom: 15px; right: 15px; padding: 10px 20px;
        background-color: #000; color: #fff; border: 1px solid red;
        border-radius: 8px; cursor: pointer; z-index: 9999; display: none;
        font-family: 'Roboto Mono', monospace;
      }
      #adminOverlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background-color: rgba(0,0,0,0.9); z-index: 99999;
        display: none; justify-content: center; align-items: center;
      }
      .admin-modal {
        background-color: #111; border: 1px solid red; border-radius: 12px;
        padding: 30px; width: 90%; max-width: 400px; text-align: center; color: white;
      }
      .admin-modal input {
        width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px;
        border: none; box-sizing: border-box; font-family: 'Roboto Mono', monospace;
      }
      .admin-modal button {
        width: 100%; padding: 12px; cursor: pointer; background-color: red;
        color: white; border: none; border-radius: 6px; font-weight: bold;
        margin-bottom: 10px; font-family: 'Roboto Mono', monospace; font-size: 16px;
      }
      .admin-modal .cancel-btn { background-color: transparent; border: 1px solid #555; color: #aaa; }
      
      #liveTracker {
        position: fixed;
        bottom: 15px;
        left: 15px;
        color: #ff0000;
        font-size: 14px;
        font-family: 'Roboto Mono', monospace;
        z-index: 998; 
        pointer-events: none;
      }
    </style>

          windowsEmulator: "https://terminator.aeza.net/en/",

          amongUs: "https://games-site-github-io-gilt.vercel.app/projects/among-us/index.html",

        function openGameInNewTab(url, message="") {
          const win = window.open("about:blank", "_blank");
          if (!win) return alert("Popup blocked! Allow popups for this site.");
          win.document.body.style.margin = '0'; win.document.body.style.height = '100vh'; win.document.body.style.backgroundColor = 'black';
          const iframe = win.document.createElement('iframe');
          iframe.src = url; iframe.style.border = 'none'; iframe.style.width = '100vw'; iframe.style.height = '100vh';
          win.document.body.appendChild(iframe);
          if(message) win.alert(message);
        }

        document.getElementById('vex6Button').onclick = () => openGameInNewTab(urls.vex6);
        document.getElementById('slowRoadsButton').onclick = () => openGameInNewTab(urls.slowRoads);

        const pastebinRawUrl = 'https://pastebin.com/raw/Jtgt3dS0'; 
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(pastebinRawUrl)}`;
        let lastMessage = "";

        async function checkForGlobalMessage() {
            if (pastebinRawUrl === 'YOUR_PASTEBIN_RAW_URL_HERE') return; 
            try {
                const response = await fetch(proxyUrl, { cache: "no-store" });
                const currentText = await response.text();
                const trimmedText = currentText.trim();

                if (trimmedText !== lastMessage && trimmedText !== "") {
                    lastMessage = trimmedText;
                    const banner = document.getElementById('globalBanner');
                    banner.innerText = trimmedText;
                    banner.style.display = 'block';
                    setTimeout(() => { banner.style.display = 'none'; }, 10000);
                }
            } catch (error) {
                console.error("Failed to check global message:", error);
            }
        }
        setInterval(checkForGlobalMessage, 15000);
        checkForGlobalMessage(); 

        // --- admin panel, delete later ---
        const ADMIN_PASSWORD = "16502690"; 
        const adminLockBtn = document.getElementById('adminLockBtn');
        const adminToggleBtn = document.getElementById('adminToggleBtn');
        const adminOverlay = document.getElementById('adminOverlay');
        const adminPromptDiv = document.getElementById('adminPromptDiv');
        const adminPanelDiv = document.getElementById('adminPanelDiv');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const verifyBtn = document.getElementById('verifyBtn');
        const cancelPromptBtn = document.getElementById('cancelPromptBtn');
        const adminMessageInput = document.getElementById('adminMessageInput');
        const sendBroadcastBtn = document.getElementById('sendBroadcastBtn');
        const closePanelBtn = document.getElementById('closePanelBtn');
        const adminStatus = document.getElementById('adminStatus');

        adminLockBtn.onclick = () => {
          adminOverlay.style.display = 'flex'; adminPromptDiv.style.display = 'block';
          adminPanelDiv.style.display = 'none'; adminPasswordInput.value = ''; adminPasswordInput.focus();
        };
        cancelPromptBtn.onclick = () => adminOverlay.style.display = 'none';
        verifyBtn.onclick = () => {
          if (adminPasswordInput.value === ADMIN_PASSWORD) {
            adminLockBtn.style.display = 'none'; adminPromptDiv.style.display = 'none';
            adminPanelDiv.style.display = 'block'; adminMessageInput.focus();
          } else {
            window.location.reload(); 
          }
        };
        adminPasswordInput.addEventListener("keypress", (e) => e.key === "Enter" && verifyBtn.click());
        closePanelBtn.onclick = () => {
          adminOverlay.style.display = 'none'; adminToggleBtn.style.display = 'block';
        };
        adminToggleBtn.onclick = () => {
          adminOverlay.style.display = 'flex'; adminPanelDiv.style.display = 'block';
          adminPromptDiv.style.display = 'none'; adminMessageInput.focus();
        };
        sendBroadcastBtn.onclick = async () => {
          const text = adminMessageInput.value;
          if (!text) return;
          adminStatus.innerText = "Sending..."; adminStatus.style.color = "#aaa";
          try {
            const res = await fetch('/api/send-message', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: text, secretPassword: adminPasswordInput.value })
            });
            if (res.ok) {
              adminStatus.innerText = "Message sent!"; adminStatus.style.color = "lightgreen";
              adminMessageInput.value = '';
              setTimeout(() => { closePanelBtn.click(); adminStatus.innerText = ""; }, 2000);
            } else {
              adminStatus.innerText = "Failed. Check Vercel logs."; adminStatus.style.color = "red";
            }
          } catch (err) {
            adminStatus.innerText = "Network error."; adminStatus.style.color = "red";
          }
        };
        adminMessageInput.addEventListener("keypress", (e) => e.key === "Enter" && sendBroadcastBtn.click());

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import { getDatabase, ref, onValue, push, onDisconnect, set } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

      // FIREBASE CONFIG STUFF
      const firebaseConfig = {
        apiKey: "AIzaSyAk-UfKf45Y9p01Vfkr574_Y45acEbIJzg",
        authDomain: "bypazz-online-users.firebaseapp.com",
        databaseURL: "https://bypazz-online-users-default-rtdb.firebaseio.com",
        projectId: "bypazz-online-users",
        storageBucket: "bypazz-online-users.firebasestorage.app",
        messagingSenderId: "154741065924",
        appId: "1:154741065924:web:49ddd5b319b1a10045e191"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const connectionsRef = ref(db, 'connections');
      const connectedRef = ref(db, '.info/connected');

      onValue(connectedRef, (snap) => {
        if (snap.val() === true) {
          const con = push(connectionsRef);
          onDisconnect(con).remove();
          set(con, true);
        }
      });
      
      onValue(connectionsRef, (snap) => {
        const count = snap.numChildren();
        document.getElementById('userCount').innerText = count;
      });
    </script>
